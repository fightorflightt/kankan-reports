  </main>

  <aside class="toc" id="toc-sidebar">
    <div class="toc-title">目录</div>
    <ul class="toc-list" id="toc-list"></ul>
  </aside>

  <script>
    // Auto-populate nav dots + TOC sidebar from .module elements
    (function() {
      var modules = document.querySelectorAll('.module');
      var dotsContainer = document.getElementById('nav-dots');
      var tocList = document.getElementById('toc-list');

      var tocLinks = [];

      modules.forEach(function(mod, i) {
        var title = mod.getAttribute('data-module-title') || ('Part ' + (i + 1));
        var num = String(i + 1).padStart(2, '0');

        // Build nav dot
        if (dotsContainer) {
          var btn = document.createElement('button');
          btn.className = 'nav-dot';
          btn.setAttribute('data-target', mod.id);
          btn.setAttribute('data-tooltip', title);
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-label', title);
          dotsContainer.appendChild(btn);
        }

        // Build TOC link
        if (tocList) {
          var li = document.createElement('li');
          li.className = 'toc-item';
          var a = document.createElement('a');
          a.className = 'toc-link';
          a.setAttribute('data-target', mod.id);
          a.href = '#' + mod.id;
          a.innerHTML = '<span class="toc-num">' + num + '</span>' + title;
          a.addEventListener('click', function(e) {
            e.preventDefault();
            var targetId = this.getAttribute('data-target');
            var target = document.getElementById(targetId);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth' });
            }
          });
          li.appendChild(a);
          tocList.appendChild(li);
          tocLinks.push(a);
        }
      });

      // Update active TOC item on scroll
      function updateTocActive() {
        if (!tocLinks.length) return;
        var scrollMid = window.scrollY + window.innerHeight / 3;
        var activeIdx = -1;
        modules.forEach(function(mod, i) {
          var top = mod.offsetTop;
          var bottom = top + mod.offsetHeight;
          if (scrollMid >= top && scrollMid < bottom) {
            activeIdx = i;
          }
        });
        tocLinks.forEach(function(link, i) {
          if (i === activeIdx) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }

      window.addEventListener('scroll', function() {
        requestAnimationFrame(updateTocActive);
      }, { passive: true });
      updateTocActive();
    })();
  </script>

</body>
</html>
